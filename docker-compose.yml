# OPTCG Monorepo - Full Stack Docker Compose Configuration
# Production-ready with best practices: health checks, resource limits, network segmentation

services:
  #============================================
  # SHARED GAME ENGINE (Base Image)
  #============================================
  game-engine:
    build:
      context: ./packages/game-engine
      dockerfile: Dockerfile
    image: optcg-engine:latest

  #============================================
  # TRAINING SERVICE
  #============================================
  training:
    build:
      context: ./packages/training
      dockerfile: Dockerfile
      target: production
    container_name: optcg-training
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./checkpoints:/app/checkpoints
      - ./logs/training:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    networks:
      - backend-net
      - monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  #============================================
  # SIMULATOR BACKEND
  #============================================
  simulator-backend:
    build:
      context: ./packages/simulator/backend
      dockerfile: Dockerfile
      target: production
    container_name: optcg-simulator-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ./logs/simulator:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    networks:
      - frontend-net
      - backend-net
      - monitoring-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M

  #============================================
  # SIMULATOR FRONTEND
  #============================================
  simulator-frontend:
    build:
      context: ./packages/simulator/frontend
      dockerfile: Dockerfile
      target: production
    container_name: optcg-simulator-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - frontend-net
    depends_on:
      simulator-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  #============================================
  # MONITORING STACK
  #============================================
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: optcg-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 1G

  grafana:
    image: grafana/grafana:10.2.0
    container_name: optcg-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-optcg}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-piechart-panel
    networks:
      - monitoring-net
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 512M

  # Container metrics collector
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: optcg-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 256M

  # Host system metrics
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: optcg-node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring-net
    deploy:
      resources:
        limits:
          memory: 128M

#============================================
# NETWORKS
#============================================
networks:
  frontend-net:
    driver: bridge
    name: optcg-frontend
  backend-net:
    driver: bridge
    name: optcg-backend
    internal: true  # No external access
  monitoring-net:
    driver: bridge
    name: optcg-monitoring

#============================================
# VOLUMES
#============================================
volumes:
  prometheus-data:
    name: optcg-prometheus-data
  grafana-data:
    name: optcg-grafana-data
